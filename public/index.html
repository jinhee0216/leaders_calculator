<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지급월 매출 합산기 (Netlify)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Montserrat:wght@700;800&display=swap');

    :root {
      --bg: #eef3ff;
      --panel: #ffffffd9;
      --panel-solid: #ffffff;
      --line: #d7e2ff;
      --text: #172b5e;
      --muted: #6a7db3;
      --primary: #4f6fff;
      --primary-dark: #2f53df;
      --chip-bg: #e9efff;
      --error: #d7263d;
      --radius: 18px;
      --font-main: 'Noto Sans KR', sans-serif;
      --font-title: 'Montserrat', 'Noto Sans KR', sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-main);
      color: var(--text);
      background:
        radial-gradient(900px 340px at 100% -10%, #d6e4ff 0%, transparent 58%),
        radial-gradient(1100px 420px at -15% -10%, #e4ecff 0%, transparent 62%),
        linear-gradient(180deg, #f6f9ff 0%, var(--bg) 100%);
    }

    .wrap {
      max-width: 980px;
      margin: 30px auto 48px;
      padding: 0 16px;
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(8px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 14px 34px rgba(47, 83, 223, 0.12), inset 0 1px 0 rgba(255,255,255,0.65);
      padding: 22px;
      margin-bottom: 16px;
      text-align: center;
    }

    .banner {
      width: 100%;
      height: 190px;
      border-radius: var(--radius);
      object-fit: cover;
      border: 1px solid var(--line);
      box-shadow: 0 10px 24px rgba(45, 78, 182, 0.10);
      background: linear-gradient(135deg, #e8efff, #dce7ff);
      margin-bottom: 14px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      background: linear-gradient(180deg, #eef3ff, #e4ecff);
      border: 1px solid #d3deff;
      color: #4f66ab;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .title {
      margin: 0;
      font-family: var(--font-title);
      font-size: clamp(24px, 4.6vw, 40px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: transparent;
      background: linear-gradient(135deg, #1b3a87, #355fca);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .service {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .logo-slot {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      border: 1px dashed #9db2ef;
      background: #fff;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #6c7faa;
      font-size: 11px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .logo-slot img { width: 100%; height: 100%; object-fit: cover; }

    .service-title {
      margin: 0;
      font-family: var(--font-title);
      font-size: clamp(24px, 4.2vw, 42px);
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: #1a2f66;
      text-shadow: 0 2px 0 rgba(255,255,255,0.75);
    }

    .desc {
      margin: 10px 0 18px;
      color: var(--muted);
      font-size: clamp(14px, 2vw, 20px);
      font-weight: 600;
      line-height: 1.45;
    }

     .dropzone {
      border: 1.5px dashed #bfd0ff;
      background: #f7faff;
      border-radius: 14px;
      padding: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      min-height: 66px;
      transition: border-color .2s ease, background .2s ease;
    }
    .dropzone:hover { border-color: #9fb7ff; background: #f3f7ff; }

    input[type='file'] {
      width: min(360px, 100%);
      border: 1px solid #b3c5ff;
      border-radius: 12px;
      background: #fff;
      padding: 8px;
      color: #253f84;
    }

    button {
      border: 0;
      border-radius: 11px;
      background: linear-gradient(180deg, #5a7bff, #3b62ea);
      color: #fff;
      font-weight: 800;
      padding: 10px 16px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(53, 95, 230, 0.28);
      transition: transform .08s ease, filter .2s ease;
    }
    button:hover { filter: brightness(1.03); }
    button:active { transform: translateY(1px); }

    .hint-box {
      margin-top: 10px;
      background: #edf3ff;
      border: 1px solid #c7d8ff;
      border-radius: 12px;
      color: #4964a8;
      font-size: 13px;
      font-weight: 600;
      padding: 11px 12px;
    }

    .error {
      margin: 14px 0 0;
      color: var(--error);
      font-weight: 800;
      font-size: 14px;
    }

    #result table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      border-radius: 12px;
      overflow: hidden;
    }
    #result th, #result td {
      border: 1px solid #d3deff;
      padding: 12px;
      text-align: center;
      font-size: 14px;
    }
    #result th { background: linear-gradient(180deg, #eef3ff, #e6eeff); }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="banner" src="./assets/banner.png" alt="상단 배너" />

    <section class="panel">
      <div class="chip">리더스론 지니위키</div>
      <h1 class="title">의료기관 매출계산기</h1>
    </section>

    <section class="panel">
      <div class="chip">월별 자동 집계</div>
      <div class="service">
        <div class="logo-slot">
          <img src="./assets/logo.png" alt="로고" onerror="this.style.display='none'; this.parentElement.textContent='LOGO';" />
        </div>
        <h2 class="service-title">의료급여 지급내역서 계산기</h2>
      </div>
      <p class="desc">지급 2024-11-19 45,340 형식의 항목을 월별로 합산합니다.</p>
      <div style="height:1px;background:linear-gradient(90deg,transparent,#cedbff,transparent);margin:8px 0 14px;"></div>

      <div class="dropzone">
        <input id="pdfFile" type="file" accept="application/pdf" />
        <button id="analyzeBtn">계산하기</button>
      </div>

      <div class="hint-box">파일을 업로드하면 지급월 합계 금액이 표시됩니다. (선지급은 제외)</div>

      <p id="message"></p>

      <div id="result" style="display:none; margin-top: 10px;">
        <p><strong id="countText"></strong></p>
        <table>
          <thead>
          <tr><th>지급월</th><th>매출 합계</th></tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
        <div style="margin-top: 12px;"><button id="downloadBtn">CSV 다운로드</button></div>
      </div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs" type="module"></script>
  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.worker.min.mjs';

    const fileInput = document.getElementById('pdfFile');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const message = document.getElementById('message');
    const result = document.getElementById('result');
    const resultBody = document.getElementById('resultBody');
    const countText = document.getElementById('countText');
    const downloadBtn = document.getElementById('downloadBtn');

    let latestRows = [];

    const DATE_RE = /(\d{4})[./-](\d{1,2})[./-](\d{1,2})/;
    const AMOUNT_RE = /-?\d[\d,]*/;

    function parseAmount(text) {
      const normalized = String(text).replace(/[^0-9-]/g, '');
      if (!normalized || normalized === '-') return null;
      return Number.parseInt(normalized, 10);
    }

    function monthKeyFromDate(dateText) {
      const m = String(dateText).match(DATE_RE);
      if (!m) return null;
      return `${m[1]}-${String(m[2]).padStart(2, '0')}`;
    }

    function normalizeForMatch(text) {
      return String(text || '').replace(/\s+/g, ' ').trim();
    }

    function isPrepaySequence(text) {
      return /(^|\s|\[|\()선\s*지\s*급(?:\s|\]|\)|$)/.test(text);
    }

    function parsePayoutLine(line) {
      const compact = normalizeForMatch(line);
      if (!compact) return null;
      if (isPrepaySequence(compact)) return null;

      const labeled = compact.match(/(?:^|\s|\[|\()지\s*급(?:\s*>\s*|\s+)(?:일\s*자\s*[:：]?\s*)?(\d{4}[./-]\d{1,2}[./-]\d{1,2})(?:\s*>\s*|\s+).*?(?:금\s*액\s*[:：]?\s*)?(-?\d[\d,]*)/);
      if (labeled) {
        const month = monthKeyFromDate(labeled[1]);
        const amount = parseAmount(labeled[2]);
        if (month && amount !== null) return { month, amount };
      }

      const standalonePay = compact.match(/(?:^|\s|\[|\()지\s*급(?:\s*>\s*|\s|\]|\)|$)(.*)/);
      if (!standalonePay) return null;

      const tail = standalonePay[1] || '';
      const dateMatch = tail.match(DATE_RE);
      if (!dateMatch) return null;

      const month = `${dateMatch[1]}-${String(dateMatch[2]).padStart(2, '0')}`;
      const rest = tail.slice(tail.indexOf(dateMatch[0]) + dateMatch[0].length);
      const amt = rest.match(AMOUNT_RE);
      if (!amt) return null;

      const amount = parseAmount(amt[0]);
      if (amount === null) return null;
      return { month, amount };
    }

    function parseFromTokenGroups(groups) {
      const out = [];
      for (const g of groups) {
        const tokens = g.map(t => String(t.str || '').trim()).filter(Boolean);

        for (let i = 0; i < tokens.length; i++) {
          const prev = (tokens[i - 1] || '').replace(/\s+/g, '');
          const cur = tokens[i].replace(/\s+/g, '');
          const nxt = (tokens[i + 1] || '').replace(/\s+/g, '');
          const isPayToken = cur === '지급' || (cur === '지' && nxt === '급');
          if (!isPayToken) continue;
          if ((prev === '선' && cur === '지급') || cur === '선지급') continue;
          if (cur === '지' && nxt === '급' && prev === '선') continue;

          const start = isPayToken && cur === '지' && nxt === '급' ? i + 2 : i + 1;
          let dateToken = null;
          let amountToken = null;

          for (let j = start; j < tokens.length; j++) {
            if (!dateToken && DATE_RE.test(tokens[j])) {
              dateToken = tokens[j];
              continue;
            }
            if (dateToken && AMOUNT_RE.test(tokens[j])) {
              amountToken = tokens[j];
              break;
            }
          }

          if (dateToken && amountToken) {
            const month = monthKeyFromDate(dateToken);
            const amount = parseAmount(amountToken);
            if (month && amount !== null) out.push({ month, amount });
          }
        }
      }
      return out;
    }

    function parseFromJoinedText(pageText) {
      const out = [];
      const normalized = normalizeForMatch(pageText);
      const re = /(?:^|\s|\[|\()지\s*급(?:\s*>\s*|\s+)(\d{4}[./-]\d{1,2}[./-]\d{1,2})(?:\s*>\s*|\s+)(-?\d[\d,]*)/g;
      for (const m of normalized.matchAll(re)) {
        const around = normalized.slice(Math.max(0, m.index - 10), m.index + 8);
        if (/선\s*$/.test(around)) continue;
        const month = monthKeyFromDate(m[1]);
        const amount = parseAmount(m[2]);
        if (month && amount !== null) out.push({ month, amount });
      }
      return out;
    }

    async function extractPageGroups(page) {
      const textContent = await page.getTextContent();
      const items = textContent.items
        .filter(i => i.str && i.str.trim())
        .map(i => ({ str: i.str.trim(), x: i.transform[4], y: Math.round(i.transform[5]) }))
        .sort((a, b) => (b.y - a.y) || (a.x - b.x));

      const groups = [];
      let currentY = null;
      let buf = [];

      for (const item of items) {
        if (currentY === null || Math.abs(item.y - currentY) <= 2) {
          currentY = currentY ?? item.y;
          buf.push(item);
        } else {
          groups.push(buf.sort((a, b) => a.x - b.x));
          currentY = item.y;
          buf = [item];
        }
      }
      if (buf.length) groups.push(buf.sort((a, b) => a.x - b.x));
      return groups;
    }

    async function analyzePdf(file) {
      const buffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
      const rows = [];

      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const groups = await extractPageGroups(page);

        const lineRows = [];
        for (const g of groups) {
          const line = g.map(x => x.str).join(' ');
          const parsed = parsePayoutLine(line);
          if (parsed) lineRows.push(parsed);
        }
        if (lineRows.length) {
          rows.push(...lineRows);
          continue;
        }

        const tokenRows = parseFromTokenGroups(groups);
        if (tokenRows.length) {
          rows.push(...tokenRows);
          continue;
        }

        const pageText = groups.map(g => g.map(x => x.str).join(' ')).join('\n');
        rows.push(...parseFromJoinedText(pageText));
      }

      return rows;
    }

    function summarize(rows) {
      const m = new Map();
      for (const r of rows) m.set(r.month, (m.get(r.month) || 0) + r.amount);
      return [...m.entries()].sort((a,b) => a[0].localeCompare(b[0])).map(([month, total]) => ({ month, total }));
    }

    function render(summary, count) {
      resultBody.innerHTML = '';
      for (const row of summary) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row.month}</td><td>${row.total.toLocaleString('ko-KR')}</td>`;
        resultBody.appendChild(tr);
      }
      countText.textContent = `총 ${count}건의 지급 항목을 분석했습니다.`;
      result.style.display = summary.length ? 'block' : 'none';
    }

    function toCsv(summary) {
      const lines = ['지급월,매출 합계'];
      summary.forEach(r => lines.push(`${r.month},${r.total}`));
      return lines.join('\n');
    }

    analyzeBtn.addEventListener('click', async () => {
      const file = fileInput.files?.[0];
      message.className = '';
      message.textContent = '';
      result.style.display = 'none';

      if (!file) {
        message.className = 'error';
        message.textContent = 'PDF 파일을 선택해주세요.';
        return;
      }

      try {
        const rows = await analyzePdf(file);
        latestRows = summarize(rows);

        if (!latestRows.length) {
          message.className = 'error';
          message.textContent = '지급 항목을 찾지 못했습니다. PDF 텍스트 추출 형식을 확인해주세요.';
          return;
        }

        render(latestRows, rows.length);
      } catch (e) {
        message.className = 'error';
        message.textContent = `분석 중 오류: ${e?.message || e}`;
      }
    });

    downloadBtn.addEventListener('click', () => {
      if (!latestRows.length) return;
      const blob = new Blob([toCsv(latestRows)], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'monthly_summary.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>
</body>
</html>
