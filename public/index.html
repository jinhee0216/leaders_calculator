<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지급월 매출 합산기 (Netlify)</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #e3e8f1;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --error: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
      font-family: 'Pretendard', 'Noto Sans KR', Arial, sans-serif;
    }
    .wrap {
      max-width: 920px;
      margin: 24px auto 48px;
      padding: 0 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      margin-top: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
      text-align: center;
    }
    .top-banner {
      width: 100%;
      height: 170px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #eef4ff;
      display: block;
      margin-bottom: 14px;
    }
    .hero {
      padding: 20px;
    }
    .brand-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 8px;
    }
    .logo-slot {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      border: 1.5px dashed #b6c2d5;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #7183a1;
      font-size: 12px;
      font-weight: 700;
      background: #f8fbff;
      overflow: hidden;
      flex-shrink: 0;
    }
    .logo-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .title {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
    .upload-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }
    input[type='file'] {
      max-width: 420px;
    }
    button {
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s;
    }
    button:hover { background: var(--primary-dark); }
    .hint { color: var(--muted); font-size: 14px; margin: 10px 0 0; }
    .error { color: var(--error); font-weight: 700; margin: 14px 2px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; overflow: hidden; }
    th, td { border: 1px solid var(--line); padding: 10px; text-align: center; }
    th { background: #f2f6ff; }
    code { background: #eef4ff; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="top-banner" src="./assets/banner.jpg" alt="상단 배너 (public/assets/banner.jpg)" />

    <div class="card hero">
      <div class="brand-row">
        <div class="logo-slot">
          <img src="./assets/logo.png" alt="로고 (public/assets/logo.png)" onerror="this.style.display='none'; this.parentElement.textContent='LOGO';" />
        </div>
        <h1 class="title">의료기관 공단급여 매출 계산기</h1>
      </div>
      <p class="desc"> www.medicare.nhis.or.kr [요양기관정보마당]에서 받 <strong>의료급여 지급내역서</strong>만 합산합니다.</p>
    </div>

    <div class="card">
      <div class="upload-row">
        <input id="pdfFile" type="file" accept="application/pdf" />
        <button id="analyzeBtn">계산하기</button>
      </div>
      <p class="hint">예: <code>지급 2024-11-19 45,340</code>, <code>지급 > 2024-11-19 > 45,340</code></p>
    </div>

    <p id="message"></p>

    <div id="result" class="card" style="display:none;">
      <p><strong id="countText"></strong></p>
      <table>
        <thead>
        <tr><th>지급월</th><th>매출 합계</th></tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
      <div style="margin-top: 12px;"><button id="downloadBtn">CSV 다운로드</button></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs" type="module"></script>
  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.worker.min.mjs';

    const fileInput = document.getElementById('pdfFile');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const message = document.getElementById('message');
    const result = document.getElementById('result');
    const resultBody = document.getElementById('resultBody');
    const countText = document.getElementById('countText');
    const downloadBtn = document.getElementById('downloadBtn');

    let latestRows = [];

    const DATE_RE = /(\d{4})[./-](\d{1,2})[./-](\d{1,2})/;
    const AMOUNT_RE = /-?\d[\d,]*/;

    function parseAmount(text) {
      const normalized = String(text).replace(/[^0-9-]/g, '');
      if (!normalized || normalized === '-') return null;
      return Number.parseInt(normalized, 10);
    }

    function monthKeyFromDate(dateText) {
      const m = String(dateText).match(DATE_RE);
      if (!m) return null;
      return `${m[1]}-${String(m[2]).padStart(2, '0')}`;
    }

    function normalizeForMatch(text) {
      return String(text || '').replace(/\s+/g, ' ').trim();
    }

    function isPrepaySequence(text) {
      return /(^|\s|\[|\()선\s*지\s*급(?:\s|\]|\)|$)/.test(text);
    }

    function parsePayoutLine(line) {
      const compact = normalizeForMatch(line);
      if (!compact) return null;

      // 지급 일자 ... 금액 ... 형태
      if (isPrepaySequence(compact)) return null;

      const labeled = compact.match(/(?:^|\s|\[|\()지\s*급(?:\s*>\s*|\s+)(?:일\s*자\s*[:：]?\s*)?(\d{4}[./-]\d{1,2}[./-]\d{1,2})(?:\s*>\s*|\s+).*?(?:금\s*액\s*[:：]?\s*)?(-?\d[\d,]*)/);
      if (labeled) {
        const month = monthKeyFromDate(labeled[1]);
        const amount = parseAmount(labeled[2]);
        if (month && amount !== null) return { month, amount };
      }

      // 지급 YYYY-MM-DD 9,890 형태
      const standalonePay = compact.match(/(?:^|\s|\[|\()지\s*급(?:\s*>\s*|\s|\]|\)|$)(.*)/);
      if (!standalonePay) return null;

      const tail = standalonePay[1] || '';
      const dateMatch = tail.match(DATE_RE);
      if (!dateMatch) return null;

      const month = `${dateMatch[1]}-${String(dateMatch[2]).padStart(2, '0')}`;
      const rest = tail.slice(tail.indexOf(dateMatch[0]) + dateMatch[0].length);
      const amt = rest.match(AMOUNT_RE);
      if (!amt) return null;

      const amount = parseAmount(amt[0]);
      if (amount === null) return null;
      return { month, amount };
    }

    function parseFromTokenGroups(groups) {
      const out = [];
      for (const g of groups) {
        const tokens = g.map(t => String(t.str || '').trim()).filter(Boolean);

        // 토큰이 [지, 급] 처럼 분리되는 케이스까지 대응
        for (let i = 0; i < tokens.length; i++) {
          const prev = (tokens[i - 1] || '').replace(/\s+/g, '');
          const cur = tokens[i].replace(/\s+/g, '');
          const nxt = (tokens[i + 1] || '').replace(/\s+/g, '');
          const isPayToken = cur === '지급' || (cur === '지' && nxt === '급');
          if (!isPayToken) continue;
          if ((prev === '선' && cur === '지급') || cur === '선지급') continue;
          if (cur === '지' && nxt === '급' && prev === '선') continue;

          const start = isPayToken && cur === '지' && nxt === '급' ? i + 2 : i + 1;
          let dateToken = null;
          let amountToken = null;

          for (let j = start; j < tokens.length; j++) {
            if (!dateToken && DATE_RE.test(tokens[j])) {
              dateToken = tokens[j];
              continue;
            }
            if (dateToken && AMOUNT_RE.test(tokens[j])) {
              amountToken = tokens[j];
              break;
            }
          }

          if (dateToken && amountToken) {
            const month = monthKeyFromDate(dateToken);
            const amount = parseAmount(amountToken);
            if (month && amount !== null) out.push({ month, amount });
          }
        }
      }
      return out;
    }

    function parseFromJoinedText(pageText) {
      const out = [];
      const normalized = normalizeForMatch(pageText);
      const re = /(?:^|\s|\[|\()지\s*급(?:\s*>\s*|\s+)(\d{4}[./-]\d{1,2}[./-]\d{1,2})(?:\s*>\s*|\s+)(-?\d[\d,]*)/g;
      for (const m of normalized.matchAll(re)) {
        const around = normalized.slice(Math.max(0, m.index - 10), m.index + 8);
        if (/선\s*$/.test(around)) continue;
        const month = monthKeyFromDate(m[1]);
        const amount = parseAmount(m[2]);
        if (month && amount !== null) out.push({ month, amount });
      }
      return out;
    }

    async function extractPageGroups(page) {
      const textContent = await page.getTextContent();
      const items = textContent.items
        .filter(i => i.str && i.str.trim())
        .map(i => ({ str: i.str.trim(), x: i.transform[4], y: Math.round(i.transform[5]) }))
        .sort((a, b) => (b.y - a.y) || (a.x - b.x));

      const groups = [];
      let currentY = null;
      let buf = [];

      for (const item of items) {
        if (currentY === null || Math.abs(item.y - currentY) <= 2) {
          currentY = currentY ?? item.y;
          buf.push(item);
        } else {
          groups.push(buf.sort((a, b) => a.x - b.x));
          currentY = item.y;
          buf = [item];
        }
      }
      if (buf.length) groups.push(buf.sort((a, b) => a.x - b.x));
      return groups;
    }

    async function analyzePdf(file) {
      const buffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
      const rows = [];

      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const groups = await extractPageGroups(page);

        // 1) 줄 기반 파싱
        const lineRows = [];
        for (const g of groups) {
          const line = g.map(x => x.str).join(' ');
          const parsed = parsePayoutLine(line);
          if (parsed) lineRows.push(parsed);
        }
        if (lineRows.length) {
          rows.push(...lineRows);
          continue;
        }

        // 2) 토큰 기반 파싱 (줄 기반 실패 시 보강)
        const tokenRows = parseFromTokenGroups(groups);
        if (tokenRows.length) {
          rows.push(...tokenRows);
          continue;
        }

        // 3) 페이지 전체 텍스트 정규식 파싱 (최종 fallback)
        const pageText = groups.map(g => g.map(x => x.str).join(' ')).join('\n');
        rows.push(...parseFromJoinedText(pageText));
      }

      return rows;
    }


    function summarize(rows) {
      const m = new Map();
      for (const r of rows) m.set(r.month, (m.get(r.month) || 0) + r.amount);
      return [...m.entries()].sort((a,b) => a[0].localeCompare(b[0])).map(([month, total]) => ({ month, total }));
    }

    function render(summary, count) {
      resultBody.innerHTML = '';
      for (const row of summary) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row.month}</td><td>${row.total.toLocaleString('ko-KR')}</td>`;
        resultBody.appendChild(tr);
      }
      countText.textContent = `총 ${count}건의 지급 항목을 분석했습니다.`;
      result.style.display = summary.length ? 'block' : 'none';
    }

    function toCsv(summary) {
      const lines = ['지급월,매출 합계'];
      summary.forEach(r => lines.push(`${r.month},${r.total}`));
      return lines.join('\n');
    }

    analyzeBtn.addEventListener('click', async () => {
      const file = fileInput.files?.[0];
      message.className = '';
      message.textContent = '';
      result.style.display = 'none';

      if (!file) {
        message.className = 'error';
        message.textContent = 'PDF 파일을 선택해주세요.';
        return;
      }

      try {
        const rows = await analyzePdf(file);
        latestRows = summarize(rows);

        if (!latestRows.length) {
          message.className = 'error';
          message.textContent = '지급 항목을 찾지 못했습니다. PDF 텍스트 추출 형식을 확인해주세요.';
          return;
        }

        render(latestRows, rows.length);
      } catch (e) {
        message.className = 'error';
        message.textContent = `분석 중 오류: ${e?.message || e}`;
      }
    });

    downloadBtn.addEventListener('click', () => {
      if (!latestRows.length) return;
      const blob = new Blob([toCsv(latestRows)], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'monthly_summary.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>
</body>
</html>
