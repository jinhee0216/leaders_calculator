<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지급월 매출 합산기 (Netlify)</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; }
    h1 { margin-bottom: 8px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-top: 16px; }
    .error { color: #c62828; font-weight: 700; }
    .hint { color: #555; font-size: 14px; }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: right; }
    th:first-child, td:first-child { text-align: left; }
    button { padding: 8px 12px; border: 0; border-radius: 6px; background: #1e88e5; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <h1>PDF 지급월 매출 합산기</h1>
  <p>GitHub → Netlify용 정적 페이지입니다. 업로드한 PDF에서 <strong>지급 뒤의 날짜/금액</strong>만 합산합니다.</p>

  <div class="card">
    <input id="pdfFile" type="file" accept="application/pdf" />
    <button id="analyzeBtn">계산하기</button>
    <p class="hint">예: <code>지급 2024-08-21 9,890</code> 패턴을 우선 인식</p>
  </div>

  <p id="message"></p>

  <div id="result" class="card" style="display:none;">
    <p><strong id="countText"></strong></p>
    <table>
      <thead>
      <tr><th>지급월</th><th>매출 합계</th></tr>
      </thead>
      <tbody id="resultBody"></tbody>
    </table>
    <button id="downloadBtn">CSV 다운로드</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs" type="module"></script>
  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.worker.min.mjs';

    const fileInput = document.getElementById('pdfFile');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const message = document.getElementById('message');
    const result = document.getElementById('result');
    const resultBody = document.getElementById('resultBody');
    const countText = document.getElementById('countText');
    const downloadBtn = document.getElementById('downloadBtn');

    let latestRows = [];

    const DATE_RE = /(\d{4})[./-](\d{1,2})[./-](\d{1,2})/;
    const AMOUNT_RE = /-?\d[\d,]*/;

    function parseAmount(text) {
      const normalized = String(text).replace(/[^0-9-]/g, '');
      if (!normalized || normalized === '-') return null;
      return Number.parseInt(normalized, 10);
    }

    function monthKeyFromDate(dateText) {
      const m = String(dateText).match(DATE_RE);
      if (!m) return null;
      return `${m[1]}-${String(m[2]).padStart(2, '0')}`;
    }

    function normalizeForMatch(text) {
      return String(text || '').replace(/\s+/g, ' ').trim();
    }

    function parsePayoutLine(line) {
      const compact = normalizeForMatch(line);
      if (!compact) return null;

      // 지급 일자 ... 금액 ... 형태
      const labeled = compact.match(/지\s*급(?:\s*>\s*|\s+)(?:일\s*자\s*[:：]?\s*)?(\d{4}[./-]\d{1,2}[./-]\d{1,2})(?:\s*>\s*|\s+).*?(?:금\s*액\s*[:：]?\s*)?(-?\d[\d,]*)/);
      if (labeled) {
        const month = monthKeyFromDate(labeled[1]);
        const amount = parseAmount(labeled[2]);
        if (month && amount !== null) return { month, amount };
      }

      // 지급 YYYY-MM-DD 9,890 형태
      const standalonePay = compact.match(/(?:^|\s|\[|\()지\s*급(?:\s*>\s*|\s|\]|\)|$)(.*)/);
      if (!standalonePay) return null;

      const tail = standalonePay[1] || '';
      const dateMatch = tail.match(DATE_RE);
      if (!dateMatch) return null;

      const month = `${dateMatch[1]}-${String(dateMatch[2]).padStart(2, '0')}`;
      const rest = tail.slice(tail.indexOf(dateMatch[0]) + dateMatch[0].length);
      const amt = rest.match(AMOUNT_RE);
      if (!amt) return null;

      const amount = parseAmount(amt[0]);
      if (amount === null) return null;
      return { month, amount };
    }

    function parseFromTokenGroups(groups) {
      const out = [];
      for (const g of groups) {
        const tokens = g.map(t => String(t.str || '').trim()).filter(Boolean);

        // 토큰이 [지, 급] 처럼 분리되는 케이스까지 대응
        for (let i = 0; i < tokens.length; i++) {
          const cur = tokens[i].replace(/\s+/g, '');
          const nxt = (tokens[i + 1] || '').replace(/\s+/g, '');
          const isPayToken = cur === '지급' || (cur === '지' && nxt === '급');
          if (!isPayToken) continue;

          const start = isPayToken && cur === '지' && nxt === '급' ? i + 2 : i + 1;
          let dateToken = null;
          let amountToken = null;

          for (let j = start; j < tokens.length; j++) {
            if (!dateToken && DATE_RE.test(tokens[j])) {
              dateToken = tokens[j];
              continue;
            }
            if (dateToken && AMOUNT_RE.test(tokens[j])) {
              amountToken = tokens[j];
              break;
            }
          }

          if (dateToken && amountToken) {
            const month = monthKeyFromDate(dateToken);
            const amount = parseAmount(amountToken);
            if (month && amount !== null) out.push({ month, amount });
          }
        }
      }
      return out;
    }

    function parseFromJoinedText(pageText) {
      const out = [];
      const normalized = normalizeForMatch(pageText);
      const re = /지\s*급(?:\s*>\s*|\s+)(\d{4}[./-]\d{1,2}[./-]\d{1,2})(?:\s*>\s*|\s+)(-?\d[\d,]*)/g;
      for (const m of normalized.matchAll(re)) {
        const month = monthKeyFromDate(m[1]);
        const amount = parseAmount(m[2]);
        if (month && amount !== null) out.push({ month, amount });
      }
      return out;
    }

    async function extractPageGroups(page) {
      const textContent = await page.getTextContent();
      const items = textContent.items
        .filter(i => i.str && i.str.trim())
        .map(i => ({ str: i.str.trim(), x: i.transform[4], y: Math.round(i.transform[5]) }))
        .sort((a, b) => (b.y - a.y) || (a.x - b.x));

      const groups = [];
      let currentY = null;
      let buf = [];

      for (const item of items) {
        if (currentY === null || Math.abs(item.y - currentY) <= 2) {
          currentY = currentY ?? item.y;
          buf.push(item);
        } else {
          groups.push(buf.sort((a, b) => a.x - b.x));
          currentY = item.y;
          buf = [item];
        }
      }
      if (buf.length) groups.push(buf.sort((a, b) => a.x - b.x));
      return groups;
    }

    async function analyzePdf(file) {
      const buffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
      const rows = [];

      for (let p = 1; p <= pdf.numPages; p++) {
        const page = await pdf.getPage(p);
        const groups = await extractPageGroups(page);

        // 1) 줄 기반 파싱
        for (const g of groups) {
          const line = g.map(x => x.str).join(' ');
          const parsed = parsePayoutLine(line);
          if (parsed) rows.push(parsed);
        }

        // 2) 토큰 기반 파싱 (표 열이 잘게 쪼개진 경우 보강)
        rows.push(...parseFromTokenGroups(groups));

        // 3) 페이지 전체 텍스트 정규식 파싱 (최종 보강)
        const pageText = groups.map(g => g.map(x => x.str).join(' ')).join('\n');
        rows.push(...parseFromJoinedText(pageText));
      }

      // 중복 제거 (month+amount 조합 단순 제거)
      const seen = new Set();
      const uniq = [];
      for (const r of rows) {
        const key = `${r.month}|${r.amount}`;
        if (!seen.has(key)) {
          seen.add(key);
          uniq.push(r);
        }
      }
      return uniq;
    }

    function summarize(rows) {
      const m = new Map();
      for (const r of rows) m.set(r.month, (m.get(r.month) || 0) + r.amount);
      return [...m.entries()].sort((a,b) => a[0].localeCompare(b[0])).map(([month, total]) => ({ month, total }));
    }

    function render(summary, count) {
      resultBody.innerHTML = '';
      for (const row of summary) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row.month}</td><td>${row.total.toLocaleString('ko-KR')}</td>`;
        resultBody.appendChild(tr);
      }
      countText.textContent = `총 ${count}건의 지급 항목을 분석했습니다.`;
      result.style.display = summary.length ? 'block' : 'none';
    }

    function toCsv(summary) {
      const lines = ['지급월,매출 합계'];
      summary.forEach(r => lines.push(`${r.month},${r.total}`));
      return lines.join('\n');
    }

    analyzeBtn.addEventListener('click', async () => {
      const file = fileInput.files?.[0];
      message.className = '';
      message.textContent = '';
      result.style.display = 'none';

      if (!file) {
        message.className = 'error';
        message.textContent = 'PDF 파일을 선택해주세요.';
        return;
      }

      try {
        const rows = await analyzePdf(file);
        latestRows = summarize(rows);

        if (!latestRows.length) {
          message.className = 'error';
          message.textContent = '지급 항목을 찾지 못했습니다. PDF 텍스트 추출 형식을 확인해주세요.';
          return;
        }

        render(latestRows, rows.length);
      } catch (e) {
        message.className = 'error';
        message.textContent = `분석 중 오류: ${e?.message || e}`;
      }
    });

    downloadBtn.addEventListener('click', () => {
      if (!latestRows.length) return;
      const blob = new Blob([toCsv(latestRows)], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'monthly_summary.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>
</body>
</html>
