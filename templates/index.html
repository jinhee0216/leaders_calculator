<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF 거래내역 월별 합산기</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 24px auto; padding: 0 16px; }
    h1 { margin-bottom: 8px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-top: 16px; }
    .error { color: #c62828; font-weight: 600; }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: right; }
    th:first-child, td:first-child { text-align: left; }
    button { padding: 8px 12px; border: 0; border-radius: 6px; background: #1e88e5; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <h1>PDF 거래내역 월별 합산기</h1>
  <p>거래내역서 PDF를 업로드하면 지급 일자 기준 월별 매출 합계를 계산합니다.</p>

  <div class="card">
    <form action="/analyze" method="post" enctype="multipart/form-data">
      <input type="file" name="pdf" accept="application/pdf" required />
      <button type="submit">계산하기</button>
    </form>
  </div>

  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}

  {% if rows %}
  <div class="card">
    <p><strong>총 {{ tx_count }}건</strong> 거래를 분석했습니다.</p>
    <table>
      <thead>
        <tr>
          <th>지급월</th>
          <th>매출 합계</th>
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
        <tr>
          <td>{{ row.month }}</td>
          <td>{{ "{:,}".format(row.total) }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <form action="/download" method="post" style="margin-top: 12px;">
      <textarea name="csv_data" hidden>{{ csv_data }}</textarea>
      <button type="submit">CSV 다운로드</button>
    </form>
  </div>
  {% endif %}
</body>
</html>
